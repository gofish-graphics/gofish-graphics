name: Unit Tests

# Runs the cross-package unit-test suites on every PR and main push.
# Distinct from the Visual Tests workflow, which does the DOM-diff and
# Python-parity regressions that need Playwright + MS core fonts.
#
# Covers:
#   - gofish-graphics: path / font helpers + the frontend-IR emitter
#     (round-trip assertions against the gofish-ir validator).
#   - gofish-ir: schema + per-operator + channel-expr validator tests,
#     hand-curated example IRs, JSON Schema build artifact.
#   - @gofish/tests: validate-python-ir — every Python story's IR is
#     validated against the canonical schema via the derive-server.

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"
  # No pull_request paths filter: this workflow is a required status check,
  # so it must always trigger and report. The cheap `changes` job below
  # decides whether the real work runs. When nothing relevant changed the
  # heavy jobs are skipped (a skipped job counts as success for required
  # checks) instead of the workflow never starting (which would leave the
  # check pending and block the PR forever).
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - "packages/**"
              - "tests/**"
              - ".github/workflows/unit-tests.yml"

  js-unit-tests:
    needs: changes
    # On push (already path-filtered above) always run; on PRs run only when
    # relevant files changed, otherwise skip (= success for required checks).
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds gofish-ir's dist + emits the JSON Schema artifact.
      # gofish-graphics' test:serialize script also builds gofish-graphics
      # so its dist/index.js is importable (lodash's CJS named exports
      # don't survive Node ESM resolution without bundling).
      - name: Build gofish-ir
        run: pnpm --filter gofish-ir build

      - name: gofish-ir tests
        run: pnpm --filter gofish-ir test

      - name: gofish-graphics tests (path + font + bbox + solver + serialize)
        run: pnpm --filter gofish-graphics test

  python-ir-validation:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/gofish-python/pyproject.toml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # vega_datasets is needed for several stories (otherwise they'd be
      # skipped). The local validate-python-ir run on Mac skips 7 stories
      # because vega_datasets isn't installed; CI should cover them.
      # scipy powers the ViolinPlot port's KDE (scipy.stats.gaussian_kde).
      - name: Install Python dependencies
        run: pip install -e packages/gofish-python vega_datasets scipy

      - name: Build gofish-ir
        run: pnpm --filter gofish-ir build

      - name: Validate every Python story IR against the canonical schema
        run: pnpm --filter @gofish/tests validate-python-ir
