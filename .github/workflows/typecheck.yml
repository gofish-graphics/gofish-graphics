name: Typecheck

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # gofish-graphics imports from gofish-ir via its package exports
      # (`./dist/index.d.ts`), so we need the types before `tsc --noEmit`
      # can resolve them.
      - name: Build gofish-ir (emits .d.ts for gofish-graphics to consume)
        run: pnpm --filter gofish-ir build

      - name: Typecheck gofish-graphics
        run: pnpm --filter gofish-graphics typecheck
