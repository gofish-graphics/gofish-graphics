        function figureSVG(pose, h) {
          const body = POSES[pose]();
          // viewBox carries 30u of transparent horizontal padding EACH SIDE (content
          // stays in 0..120, centered at 60). The .figure box sizes to this svg, and
          // because content-visibility:auto implies paint containment (which CLIPS
          // overflow at the .figure border box), the padding is what keeps a raised
          // arm from being clipped when the repulsion lean rotates the figure. Width
          // scales with the wider box so pixels-per-unit — and the rendered body — are
          // unchanged; the padding is invisible and symmetric, so nothing shifts.
          return (
            '<svg width="' +
            (h * 180) / 230 +
            '" height="' +
            h +
            '" viewBox="-30 0 180 230" aria-hidden="true">' +
            body +
            "</svg>"
          );
        }
        window.__figureSVG = figureSVG; // throwaway hook for the pose-review loop

        // =====================================================================
        // FIGURE DISTRIBUTION — derive visitor rest-positions from the packing
        // output so people actually stand near the art, spread along the WHOLE
        // wall (which may be 30 or 150 pieces long), re-derived on every repack.
        //
        // Rule (deterministic, seeded by the filtered count so it's stable within a
        // session but changes when the filter changes):
        //   - target count ≈ one figure per ~620px of hung wall, capped (desktop 80,
        //     mobile 3). Cheap inline SVGs, but content-visibility:auto keeps the
        //     off-screen ones free at n=150.
        //   - lay `target` "anchor" viewers across the columns at an even stride with
        //     ±70% stride jitter, so they cluster near pieces yet leave natural gaps
        //     (not a uniform comb). Each anchor stands slightly off its column center.
        //   - depth variation: nearer figures are taller + more opaque.
        //   - garnish for believability: one bench sitter in the middle third, an
        //     occasional companion pair, and an occasional child beside a "parent".
        // =====================================================================
        const STAND_POSES = [
          "leaning",
          "pondering",
          "pointing",
          "lookup",
          "leaning",
          "pondering",
        ];

        function distributeFigures(list, layout) {
          const cols = (layout && layout.spots) || [];
          if (!cols.length) return [];
          const e = env;
          const wallStart = layout.caps.entrance;
          const wallEnd = layout.artRight;
          const span = Math.max(1, wallEnd - wallStart);
          const cap = e.mobile ? 3 : 80;
          let target = Math.round(span / 620);
          target = Math.max(1, Math.min(cap, target));

          const rng = mulberry32((list.length * 2654435761 + 1013904223) >>> 0);
          const stride = cols.length / target;
          const figs = [];
          let benchPlaced = false;

          for (let i = 0; i < target && figs.length < cap; i++) {
            let idx = Math.floor(i * stride + (rng() - 0.5) * stride * 0.7);
            idx = Math.max(0, Math.min(cols.length - 1, idx));
            const col = cols[idx];
            const off = (rng() - 0.5) * Math.min(120, (col.w || 200) * 0.7);
            const x = col.cx + off;
            const depth = rng(); // 0 far .. 1 near
            const h = Math.round(
              (e.mobile ? 150 : 185) + depth * (e.mobile ? 40 : 85)
            );
            const op = +(0.84 + depth * 0.16).toFixed(3);
            let pose = STAND_POSES[Math.floor(rng() * STAND_POSES.length)];

            const frac = i / target;
            // one bench sitter, somewhere in the middle stretch of the hall
            if (!benchPlaced && frac > 0.33 && frac < 0.66 && rng() < 0.6) {
              pose = "sitting";
              benchPlaced = true;
            }
            figs.push({ x, h, op, pose });

            // occasional companion pair beside this viewer
            if (pose !== "sitting" && figs.length < cap && rng() < 0.2) {
              const d2 = rng();
              figs.push({
                x: x + 52 + rng() * 46,
                h: Math.round(
                  (e.mobile ? 150 : 175) + d2 * (e.mobile ? 35 : 75)
                ),
                op: +(0.84 + d2 * 0.16).toFixed(3),
                pose: STAND_POSES[Math.floor(rng() * STAND_POSES.length)],
              });
            }
            // a child near a parent, occasionally
            if (figs.length < cap && rng() < 0.16) {
              figs.push({
                x: x - 40 - rng() * 28,
                h: Math.round((e.mobile ? 96 : 112) + rng() * 22),
                op: 0.9,
                pose: "child",
              });
            }
          }
          return figs;
        }

        // =====================================================================
        // FIGURE RENDER + POINTER REPULSION
        // Figures step aside from the pointer in exactly two situations, and
        // otherwise stay put:
        //   (1) 2D PROXIMITY — the pointer is close BOTH horizontally (within
        //       `radius`) AND vertically (inside the figure's body band — feet→head
        //       — plus a `bandMargin` soft zone). The x falloff is multiplied by a
        //       smoothstep over vertical distance, so figures ease in/out rather
        //       than snapping when the cursor crosses a height threshold. Moving the
        //       mouse high on the wall above people's heads does NOT scatter them.
        //   (2) READING A CHART — the pointer is over a piece (frame or its plaque).
        //       A figure steps fully clear of the nearest frame edge (+`edgeMargin`)
        //       only when its silhouette overlaps that frame BOTH horizontally AND
        //       vertically — i.e. the frame's bottom edge reaches below the figure's
        //       head (with a small `headTol` so a frame merely grazing a head doesn't
        //       trigger). A chart hanging entirely above the figure's head (e.g. the
        //       top row of a stacked column) is not in the way, so the figure stays
        //       put. This displacement is geometric and may exceed `maxDisp`.
        // When both apply, the larger displacement wins (they are not summed).
        // Motion is rAF-lerped (not a CSS snap) with a tiny body lean. Touch never
        // triggers either rule.
        // =====================================================================
        const REP = reduceMotion
          ? {
              radius: 150,
              maxDisp: 44,
              lerp: 0.08,
              lean: 0,
              bandMargin: 30,
              edgeMargin: 14,
              headTol: 10,
            }
          : {
              radius: 172,
              maxDisp: 94,
              lerp: 0.12,
              lean: 2.2,
              bandMargin: 40,
              edgeMargin: 18,
              headTol: 10,
            };
        // smoothstep — eased 0→1 ramp between two edges, used for the vertical falloff.
        const smoothstep = (e0, e1, x) => {
          const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
          return t * t * (3 - 2 * t);
        };

        let figureState = [];
        function renderFigures(figs) {
          figuresEl.innerHTML = "";
          figureState = [];
          for (const v of figs) {
            const el = document.createElement("div");
            el.className = "figure";
            el.style.left = Math.round(v.x) + "px"; // rest position, in track coords
            el.style.opacity = v.op;
            el.style.setProperty(
              "--stand",
              "calc(var(--floor-h) - " + Math.round(v.h * 0.1) + "px)"
            );
            el.style.transform = "translateX(-50%)";
            el.innerHTML =
              '<div class="shadow"></div><div class="lean"><div class="body">' +
              figureSVG(v.pose, v.h) +
              "</div></div>";
            figuresEl.appendChild(el);
            figureState.push({
              el,
              leanEl: el.querySelector(".lean"),
              // half the rendered silhouette width (svg is h*120/230 wide), so we can
              // test frame overlap and clear the whole body past a frame edge.
              restX: v.x,
              halfW: (v.h * 120) / 230 / 2,
              disp: 0,
              prevTotal: 0,
            });
          }
        }
        // puzzled figure for the empty state (separate, in the viewport-fixed overlay)
        document.getElementById("emptyfig").innerHTML = figureSVG(
          "puzzled",
          240
        );

        // pointer state, converted to track coordinates each frame (so it tracks
        // correctly as the hall scrolls under a stationary pointer). pointerClientY
        // stays in client coords (the hall only scrolls horizontally, so a figure's
        // vertical band is stable in viewport space). `hoveredPiece` is the piece the
        // pointer is currently reading (frame or plaque), or null — it drives rule 2.
        let pointerClientX = 0,
          pointerClientY = 0,
          pointerActive = false,
          figRAF = 0;
        let hoveredPiece = null;
        function figureTick() {
          figRAF = 0;
          let busy = false;
          let ptx = -1e9;
          if (pointerActive) {
            const rect = hall.getBoundingClientRect();
            ptx = hall.scrollLeft + (pointerClientX - rect.left);
          }
          // rule 2's avoidance region is the hovered piece's full HUNG FOOTPRINT — the
          // UNION of its frame box and its plaque box — so a figure must clear both the
          // chart and its label (the plaque hangs below the frame at body height, right
          // where figures stand). Computed ONCE per frame for the hovered piece (two
          // getBoundingClientRect calls total, independent of the figure count) — never
          // per figure. Horizontal span is in track coords (to match figure restX); the
          // union's bottom is in client coords (figure silhouettes are measured there,
          // same as rule 1, race-free with the depth-varied figure heights).
          let unionLeft = 0,
            unionRight = 0,
            unionBottomClient = 0,
            reading = false;
          if (hoveredPiece) {
            const fr = hoveredPiece.frameEl.getBoundingClientRect();
            if (fr.width > 0 && fr.height > 0) {
              // hovered piece is on-screen
              const pr = hoveredPiece.plaqueEl.getBoundingClientRect();
              // plaque is centered on the piece (left:50%) at its own max-content
              // width: capped at boxW but min 116px, so it can overhang a narrow frame.
              const cx = hoveredPiece.x + hoveredPiece.boxW / 2;
              const plaqueHalfW = (pr.width || 0) / 2;
              unionLeft = Math.min(hoveredPiece.x, cx - plaqueHalfW);
              unionRight = Math.max(
                hoveredPiece.x + hoveredPiece.boxW,
                cx + plaqueHalfW
              );
              // union bottom = the PLAQUE's bottom (it hangs below the frame), so
              // virtually any figure standing in front of a plaque now qualifies.
              unionBottomClient = Math.max(fr.bottom, pr.bottom);
              reading = true;
            }
          }
          for (const f of figureState) {
            // --- rule 1: 2D proximity (signed displacement away from the pointer) ---
            let prox = 0;
            if (pointerActive) {
              const dx = f.restX - ptx;
              const ad = Math.abs(dx);
              if (ad < REP.radius) {
                const fallX = 1 - ad / REP.radius; // 1 near .. 0 at edge
                // vertical band: full effect inside the body (head→feet), easing to 0
                // over bandMargin above the head / below the feet via smoothstep.
                const r = f.el.getBoundingClientRect();
                let vFall = 1;
                if (pointerClientY < r.top || pointerClientY > r.bottom) {
                  const dv =
                    pointerClientY < r.top
                      ? r.top - pointerClientY
                      : pointerClientY - r.bottom;
                  vFall = 1 - smoothstep(0, REP.bandMargin, dv);
                }
                prox = Math.sign(dx || 1) * REP.maxDisp * fallX * fallX * vFall;
              }
            }
            // --- rule 2: step fully clear of the piece the pointer is reading ---
            let clear = 0;
            if (
              reading &&
              f.restX + f.halfW > unionLeft &&
              f.restX - f.halfW < unionRight
            ) {
              // require VERTICAL overlap too: the union's bottom edge must reach below
              // the figure's head (with `headTol` slack), else the piece hangs entirely
              // above the figure (e.g. top row of a stacked column) and is not in the
              // way. content-visibility:auto can null out an off-screen figure's rect;
              // an empty rect means it can't overlap the on-screen hovered piece, so
              // we skip it. Compared in client coords, same space as the union bottom.
              const fc = f.el.getBoundingClientRect();
              const overlapsV =
                fc.height > 0 && unionBottomClient > fc.top + REP.headTol;
              if (overlapsV) {
                // exit toward the nearer union edge, body fully past it + a margin, so
                // the figure clears both the chart and its plaque label.
                const toLeft = f.restX - unionLeft <= unionRight - f.restX;
                const targetCx = toLeft
                  ? unionLeft - REP.edgeMargin - f.halfW
                  : unionRight + REP.edgeMargin + f.halfW;
                clear = targetCx - f.restX;
              }
            }
            // both rules: take the larger displacement, never the sum.
            let tgt = Math.abs(clear) > Math.abs(prox) ? clear : prox;
            f.disp += (tgt - f.disp) * REP.lerp;
            const total = f.disp;
            const moved = Math.abs(total - f.prevTotal) > 0.05;
            if (moved) {
              f.el.style.transform =
                "translateX(calc(-50% + " + total.toFixed(1) + "px))";
              if (REP.lean && f.leanEl) {
                const lean = Math.max(
                  -5,
                  Math.min(5, (total - f.prevTotal) * REP.lean)
                );
                f.leanEl.style.transform = "rotate(" + lean.toFixed(2) + "deg)";
              }
            }
            f.prevTotal = total;
            if (Math.abs(tgt - f.disp) > 0.1) busy = true;
          }
          if (busy || pointerActive) figRAF = requestAnimationFrame(figureTick);
        }
        function kickFigures() {
          if (!figRAF) figRAF = requestAnimationFrame(figureTick);
        }

        scene.addEventListener("pointermove", (e) => {
          if (e.pointerType === "touch") return; // touch: repulsion never triggers
          pointerClientX = e.clientX;
          pointerClientY = e.clientY;
          pointerActive = true;
          kickFigures();
        });
        scene.addEventListener("pointerleave", () => {
          pointerActive = false;
          hoveredPiece = null;
          kickFigures();
        });
        window.addEventListener("blur", () => {
          pointerActive = false;
          hoveredPiece = null;
          kickFigures();
        });

        // =====================================================================
        // PACKING — greedy column-fill strip packing, O(n).
        //
        // The wall is a fixed-height band centered on the "gallery line" (museum
        // eye level, a little above wall center). We walk the (filtered) pieces
        // in order and drop each into the current column, top to bottom, until
        // adding the next piece would overflow the band — then we start a new
        // column to the right. Each column's stack is then centered vertically on
        // the gallery line with a constant gap, so single tall portraits hang
        // alone at eye level and pairs sit balanced around it. Frame box sizes
        // come straight from the chart's true w×h × one global scale, so the
        // natural size variation becomes the salon-wall irregularity.
        //
        // One spotlight is emitted per column, aimed at the column's center, so
        // light always lands on real art. Result feeds absolute transforms +
        // CSS transitions, so a re-filter animates pieces to new homes.
        // =====================================================================
        let pieces = []; // {data, el, frameEl, artEl, injected, ...}
        let env = {};

        function computeEnv() {
          const vw = window.innerWidth;
          const sceneH = scene.clientHeight;
          // Measure the floor's real pixel height (its clamp()/dvh resolved): the
          // raw custom-property string can't be parseFloat'd reliably.
          const floorEl = document.querySelector(".floor");
          const floorH =
            floorEl.getBoundingClientRect().height || Math.round(sceneH * 0.26);
          const wallH = sceneH - floorH; // wall region height (track coords)

          const mobile = vw <= 640;
          // Reserve a strip below the ceiling (rail + light fixtures + the mouth of
          // the light cone) and a margin above the baseboard, so frames never crop
          // into the ceiling fixtures or run off the floor. The packing BAND is what
          // remains; every piece is constrained to it (and scaled down if too tall).
          const ceilPad = mobile ? 56 : 78; // rail@30 + fixture@26..52 + cone mouth
          const basePad = mobile ? 16 : 24; // breathing room above the baseboard
          const band = Math.max(140, wallH - ceilPad - basePad);

          const mat = mobile ? 9 : 13;
          const bord = mobile ? 6 : 11; // average; per-frame border varies but box uses this
          const plaqueGap = mobile ? 10 : 12;
          const plaqueH = mobile ? 44 : 48; // tall enough for a 2-line title + desc
          const vGap = mobile ? 26 : 36; // gap between stacked pieces in a column
          const hGap = mobile ? 38 : 64; // gap between columns
          const perFixed = mat * 2 + bord * 2 + plaqueGap + plaqueH; // non-art height of a piece

          // GLOBAL FRAME SCALE — the lever that creates the salon hang. We pick the
          // single scale S so that TWO reference short-landscape charts (the dominant
          // ~380-tall cluster; ref height 420 leaves a little headroom) plus their
          // plaques and the inter-piece gap exactly fill the band:
          //     2·(refH·S + perFixed) + vGap = band.
          // Consequence: the common short charts pair up two-to-a-column, while any
          // chart taller than the reference (box plot 680, polar ribbon/rose 588)
          // overflows a 2-stack and is forced to hang alone — so the natural variation
          // in chart height becomes the irregular salon arrangement, automatically.
          const refH = 420;
          let S = (band - vGap - 2 * perFixed) / (2 * refH);
          S = Math.max(mobile ? 0.24 : 0.3, Math.min(mobile ? 0.42 : 0.46, S));

          return {
            S,
            mat,
            bord,
            plaqueGap,
            plaqueH,
            vGap,
            hGap,
            wallH,
            band,
            bandTop: ceilPad, // top of the packing band, below the fixtures
            leftPad: mobile ? 320 : 0, // entrance wall reserved width (see layout)
            mobile,
          };
        }

        // measure entrance/end wall widths so pieces never collide with the copy
        function endcapWidths() {
          // On phones, cap the entrance at ~66% of the viewport so the first frame
          // peeks in from the right edge — an invitation to swipe rather than a full
          // intro screen that hides all the art until you scroll.
          const mobileCap = Math.round(window.innerWidth * 0.66);
          return {
            entrance: Math.min(
              entrance.scrollWidth + 70,
              env.mobile ? mobileCap : 560
            ),
            endwall: Math.min(endwall.scrollWidth + 70, env.mobile ? 320 : 460),
          };
        }

        let lastPackMs = 0;
        function pack(list) {
          const t0 = performance.now();
          const e = env;
          const caps = endcapWidths();
          const startX = caps.entrance + e.hGap;

          // box dimensions per piece. If a single piece (frame + plaque) is taller
          // than the band, scale just THAT piece down so it fits rather than letting
          // it crop into the ceiling/floor.
          const chrome = e.mat * 2 + e.bord * 2;
          for (const p of list) {
            let fw = p.data.w * e.S,
              fh = p.data.h * e.S;
            let total = fh + chrome + e.plaqueGap + e.plaqueH;
            if (total > e.band) {
              // shrink the art (chart) box so the whole piece fits the band height
              const artMax = e.band - e.plaqueGap - e.plaqueH - chrome;
              const f = Math.max(0.1, artMax / fh);
              fw *= f;
              fh *= f;
            }
            p.boxW = fw + chrome;
            p.boxH = fh + chrome;
            p.artW = fw;
            p.artH = fh;
            p.totalH = p.boxH + e.plaqueGap + e.plaqueH;
          }

          // greedy column fill
          const columns = [];
          let col = [],
            colH = 0,
            colW = 0;
          const flush = () => {
            if (col.length) {
              columns.push({ items: col, h: colH, w: colW });
            }
            col = [];
            colH = 0;
            colW = 0;
          };
          for (const p of list) {
            const add = (col.length ? e.vGap : 0) + p.totalH;
            if (col.length && colH + add > e.band) flush();
            colH += (col.length ? e.vGap : 0) + p.totalH;
            colW = Math.max(colW, p.boxW);
            col.push(p);
          }
          flush();

          // place columns left→right, centering each stack on the gallery line
          let x = startX;
          const spots = [];
          for (const c of columns) {
            const cx = x + c.w / 2;
            let y = e.bandTop + (e.band - c.h) / 2;
            const top = y;
            for (const p of c.items) {
              p.x = cx - p.boxW / 2;
              p.y = y;
              y += p.boxH + e.plaqueGap + e.plaqueH + e.vGap;
            }
            const bottom = y - e.vGap;
            spots.push({
              cx,
              top: e.bandTop,
              aimTop: top,
              aimBottom: bottom,
              w: c.w,
            });
            x = cx + c.w / 2 + e.hGap;
          }

          const artRight = columns.length ? x : startX;
          lastPackMs = performance.now() - t0;
          return { columns, spots, artRight, caps };
        }

        // =====================================================================
        // BUILD pieces (once). Charts are lazy-injected by IntersectionObserver.
        // =====================================================================
        function escapeHTML(s) {
          return String(s).replace(
            /[&<>"]/g,
            (c) =>
              ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]
          );
        }

        function buildPieces() {
          const frag = document.createDocumentFragment();
          for (const d of DATA) {
            const el = document.createElement("div");
            el.className = "piece";
            el.tabIndex = 0;
            el.setAttribute("role", "link");
            el.setAttribute("aria-label", d.title + " — open example");

            const frame = document.createElement("div");
            frame.className = "frame " + d.frameClass;
            const art = document.createElement("div");
            art.className = "art empty";
            frame.appendChild(art);

            const plaque = document.createElement("div");
            plaque.className = "plaque";
            plaque.innerHTML =
              '<div class="ptitle">' +
              escapeHTML(d.title) +
              "</div>" +
              (d.description
                ? '<div class="pdesc">' + escapeHTML(d.description) + "</div>"
                : "");

            el.appendChild(frame);
            el.appendChild(plaque);

            const go = () =>
              window.open(DOCS_ORIGIN + d.id + ".html", "_blank", "noopener");
            el.addEventListener("click", go);
            el.addEventListener("keydown", (ev) => {
              if (ev.key === "Enter") go();
            });

            const p = {
              data: d,
              el,
              frameEl: frame,
              artEl: art,
              plaqueEl: plaque,
              injected: false,
            };
            // reading-a-chart hover (rule 2): the plaque is pointer-events:none so its
            // hovers bubble to the piece — pointerenter/leave on the piece covers both
            // frame and plaque. Touch never arms repulsion.
            el.addEventListener("pointerenter", (ev) => {
              if (ev.pointerType === "touch") return;
              hoveredPiece = p;
              kickFigures();
            });
            el.addEventListener("pointerleave", (ev) => {
              if (ev.pointerType === "touch") return;
              if (hoveredPiece === p) hoveredPiece = null;
              kickFigures();
            });
            el._piece = p;
            pieces.push(p);
            frag.appendChild(el);
          }
          track.appendChild(frag);
        }

        // =====================================================================
        // TRANSIT VELOCITY GATE — the fix for the Home/End / minimap-drag / fling lag.
        //
        // A smooth glide across the whole hall sweeps the viewport past every column.
        // Without a gate, the lazy loader injects AND then reclaims every chart SVG en
        // route mid-animation (incl. a 627KB violin svg) — massive DOM churn + GC that
        // tanks the frame rate and tears the screen. The pieces you fly past are pure
        // waste: injected one frame, destroyed the next.
        //
        // So we measure scroll velocity (Δ scrollLeft per frame, sampled in a rAF loop
        // so it keeps decaying after scroll events stop and can detect the landing) and
        // while the hall is moving fast we INJECT NOTHING — frames show their cheap
        // empty mat — and DEFER reclamation into `pendingReclaim`. When velocity drops
        // below the gate for a couple of frames (the glide lands / scrolling settles),
        // one settle pass injects what's actually near the viewport and flushes the
        // deferred reclaims for whatever is still far away. This fixes Home/End glides,
        // minimap drags AND fast wheel flings with one mechanism. The gate threshold is
        // set well above normal wheel-scroll velocity so ordinary browsing still injects
        // promptly with no visible empty frames.
        // =====================================================================
        const VEL_GATE = 55; // px/frame; above this, suppress injection mid-flight
        const SETTLE_FRAMES = 2; // frames at/below the gate before the settle pass runs
        let hallVel = 0; // px/frame, sampled each animation frame
        let lastSampleLeft = hall.scrollLeft;
        let velRAF = 0,
          settleFrames = 0;
        const pendingReclaim = new Set();
        function isFast() {
          return hallVel > VEL_GATE;
        }

        function reclaim(p) {
          p.artEl.innerHTML = "";
          p.artEl.classList.add("empty");
          p.injected = false;
          p._queued = false;
          pendingReclaim.delete(p);
        }

        // ---- budgeted injection queue: parse at most ONE chart svg per frame.
        // Even after the gate suppresses transit churn, the moment a glide LANDS we'd
        // otherwise inject the whole destination band (incl. the 627KB violin svg) in a
        // single synchronous frame — a ~800ms hitch. Draining one piece per frame caps
        // each frame to a single chart's parse cost (≈ the violin alone, unavoidable),
        // so the destination fills in over a few frames instead of one giant stall.
        const injectQueue = [];
        let injectRAF = 0;
        function enqueueInject(p) {
          if (!p || p.injected || p._queued || p.data._gone) return;
          p._queued = true;
          injectQueue.push(p);
          if (!injectRAF) injectRAF = requestAnimationFrame(drainInject);
        }
        function drainInject() {
          injectRAF = 0;
          // one per frame; if the hall is flung again mid-drain, isFast() pauses us.
          if (!isFast()) {
            const p = injectQueue.shift();
            if (p) {
              p._queued = false;
              if (!p.injected && !p.data._gone) {
                injectChart(p.artEl, p.data);
                p.injected = true;
              }
            }
          }
          if (injectQueue.length)
            injectRAF = requestAnimationFrame(drainInject);
        }

        // settle pass: scrolling has slowed/stopped — inject near the viewport now and
        // reclaim anything we deferred that ended up far away (pieces still near the
        // viewport stay injected; we just cancel their deferred reclaim).
        function onSettle() {
          hallVel = 0;
          ensureVisible();
          if (pendingReclaim.size) {
            const left = hall.scrollLeft - 1900;
            const right = hall.scrollLeft + hall.clientWidth + 1900;
            for (const p of [...pendingReclaim]) {
              if (p.x == null || p.x + p.boxW < left || p.x > right) reclaim(p);
              else pendingReclaim.delete(p);
            }
          }
        }

        function velTick() {
          velRAF = 0;
          const sl = hall.scrollLeft;
          hallVel = Math.abs(sl - lastSampleLeft);
          lastSampleLeft = sl;
          if (hallVel > VEL_GATE) {
            settleFrames = 0;
            velRAF = requestAnimationFrame(velTick); // keep sampling while in transit
          } else if (settleFrames < SETTLE_FRAMES) {
            settleFrames++;
            velRAF = requestAnimationFrame(velTick); // confirm the hall really stopped
          } else {
            onSettle(); // landed — inject + flush reclaims
          }
        }
        function kickVel() {
          if (!velRAF) velRAF = requestAnimationFrame(velTick);
        }

        // An instant (non-glide) jump — reduced-motion Home/End — has no transit frames
        // to protect, so it must inject immediately and not wait on the gate/settle cycle.
        function instantJumpInject() {
          hallVel = 0;
          settleFrames = SETTLE_FRAMES;
          lastSampleLeft = hall.scrollLeft;
          ensureVisible();
        }

        // ---- lazy chart injection: inject when a piece nears the viewport,
        // and drop the (possibly heavy) SVG DOM again when it's far away, so even
        // in ?n=150 mode only a viewport-band of charts ever lives in the DOM.
        // Both gated by the velocity gate above: mid-glide we neither inject nor
        // reclaim (reclaims are deferred), so a fly-past costs nothing.
        const io = new IntersectionObserver(
          (entries) => {
            for (const en of entries) {
              const p = en.target._piece;
              if (!p) continue;
              if (en.isIntersecting) {
                pendingReclaim.delete(p); // back in view — cancel any defer
                if (!isFast()) enqueueInject(p); // budgeted: 1 chart parse / frame
              } else if (p.injected) {
                // far outside the generous rootMargin — reclaim, unless we're in transit
                // (then defer: reclaiming a piece we're flying past is wasted work).
                if (isFast()) pendingReclaim.add(p);
                else reclaim(p);
              }
            }
          },
          { root: hall, rootMargin: "300px 1800px 300px 1800px", threshold: 0 }
        );

        // =====================================================================
        // APPLY a layout: position every visible piece + draw spotlights.
        // =====================================================================
        function applyLayout(list, layout) {
          const e = env;
          // size + place visible pieces
          for (const p of list) {
            const d = p.data;
            p.el.classList.remove("gone");
            p.el.style.display = "";
            if (p._hideT) {
              clearTimeout(p._hideT);
              p._hideT = 0;
            } // cancel a pending hide
            // intrinsic size keeps content-visibility:auto cheap when off-screen
            p.el.style.containIntrinsicSize =
              Math.round(p.boxW) + "px " + Math.round(p.totalH) + "px";
            p.el.style.width = Math.round(p.boxW) + "px";
            // height must include the plaque so paint-containment doesn't clip it
            p.el.style.height = Math.round(p.totalH) + "px";
            // transit proxy: frame-box height + material edge color, read by the
            // .track.transit .piece background that paints the cheap mat+outline.
            p.el.style.setProperty("--fh", Math.round(p.boxH) + "px");
            p.el.style.setProperty(
              "--edge",
              FRAME_EDGE[d.frameClass] || "#6b4a2a"
            );
            p.frameEl.style.setProperty("--mat", e.mat + "px");
            p.artEl.style.width = Math.round(p.artW) + "px";
            p.artEl.style.height = Math.round(p.artH) + "px";
            p.plaqueEl.style.setProperty("--plaque-gap", e.plaqueGap + "px");
            // cap the plaque at the frame width so it grows to fit the title up to the
            // frame edge, then wraps — and is never clipped by paint containment.
            p.plaqueEl.style.setProperty(
              "--plaque-max",
              Math.round(p.boxW) + "px"
            );
            const tx = Math.round(p.x);
            const ty = Math.round(p.y + d.jY);
            p.el.style.transform =
              "translate(" +
              tx +
              "px," +
              ty +
              "px) rotate(" +
              d.jRot.toFixed(2) +
              "deg)";
          }
          // Hide filtered-out pieces (kept in DOM, cheap). They fade via the opacity
          // transition, THEN drop to display:none so their old far-right transforms
          // stop inflating the scroll width — otherwise the hall keeps scrolling out
          // to the unfiltered length into empty wall (the item-4 bug).
          const visible = new Set(list);
          for (const p of pieces) {
            if (!visible.has(p)) {
              p.data._gone = true;
              if (p.el.style.display !== "none" && !p._hideT) {
                p.el.classList.add("gone");
                p._hideT = setTimeout(
                  () => {
                    p.el.style.display = "none";
                    p._hideT = 0;
                    // once it's out of flow the scroll content shrinks; re-clamp.
                    const max = Math.max(
                      0,
                      parseFloat(track.style.width) - hall.clientWidth
                    );
                    if (hall.scrollLeft > max) hall.scrollLeft = max;
                  },
                  reduceMotion ? 220 : 480
                );
              }
            } else {
              p.data._gone = false;
            }
          }

          // ---- spotlights from packing output ----
          spotsEl.innerHTML = "";
          const floorTop = e.wallH; // top of floor in track coords
          for (const s of layout.spots) {
            const wrap = document.createElement("div");
            wrap.className = "spot";
            wrap.style.left = Math.round(s.cx) + "px";
            wrap.style.top = "0px";
            const coneW = Math.max(s.w * 2.1, 220);
            const coneH = floorTop - 40;
            const glowW = Math.max(s.w * 1.25, 180);
            const glowH = Math.min(coneH, s.aimBottom - 40 || coneH);
            const fixture =
              '<svg class="fixture" viewBox="0 0 20 26" aria-hidden="true">' +
              '<rect x="8" y="0" width="4" height="8" fill="#3a332c"/>' +
              '<ellipse cx="10" cy="9" rx="9" ry="4" fill="#4a4038"/>' +
              '<path d="M2 9 L18 9 L15 20 L5 20 Z" fill="#5b5048"/>' +
              '<ellipse cx="10" cy="20" rx="5.4" ry="2.2" fill="#ffe9b0"/>' +
              "</svg>";
            const poolW = coneW * 0.85,
              poolH = e.mobile ? 26 : 42;
            wrap.innerHTML =
              fixture +
              '<div class="cone" style="width:' +
              Math.round(coneW) +
              "px;height:" +
              Math.round(coneH) +
              'px"></div>' +
              '<div class="glow" style="width:' +
              Math.round(glowW) +
              "px;height:" +
              Math.round(glowH) +
              'px"></div>' +
              '<div class="pool" style="top:' +
              Math.round(floorTop + 10) +
              "px;width:" +
              Math.round(poolW) +
              "px;height:" +
              Math.round(poolH) +
              'px"></div>';
            spotsEl.appendChild(wrap);
          }

          // ---- size the track + place end wall ----
          const caps = layout.caps;
          const total = list.length
            ? layout.artRight + caps.endwall + (e.mobile ? 40 : 80)
            : caps.entrance + (e.mobile ? 300 : 520);
          // Resize the scroll content to the packed extent so a filtered hall no
          // longer scrolls into empty wall. wall/floor (left:0;right:0) follow this
          // width automatically; the end wall is repositioned right after the last
          // column; then clamp scrollLeft into the new (possibly much shorter) range.
          const trackW = Math.max(total, window.innerWidth);
          track.style.width = trackW + "px";
          entrance.style.width = caps.entrance + "px";
          endwall.style.left =
            (list.length ? layout.artRight : caps.entrance + e.hGap) + "px";
          endwall.style.width = caps.endwall + "px";
          endwall.style.right = "auto";

          const maxScroll = Math.max(0, trackW - hall.clientWidth);
          if (hall.scrollLeft > maxScroll) hall.scrollLeft = maxScroll;

          updateMinimap(list, layout);
          ensureVisible();
        }

        // Inject any piece whose packed x falls within a wide window of the current
        // scroll position. Complements the IntersectionObserver (which can lag an
        // instant scrollLeft jump from the minimap/keyboard): this only ever injects,
        // the observer still reclaims DOM when pieces drift far away.
        function ensureVisible() {
          // mid-glide we inject nothing — the settle pass (onSettle) will inject once
          // the hall stops sweeping past columns. This is what kills the transit churn.
          if (isFast()) return;
          const sl = hall.scrollLeft;
          const left = sl - 1900;
          const right = sl + hall.clientWidth + 1900;
          for (const p of pieces) {
            if (p.data._gone || p.injected || p._queued) continue;
            if (p.x != null && p.x + p.boxW > left && p.x < right)
              enqueueInject(p);
          }
        }

        // =====================================================================
        // FILTER + REPACK
        // =====================================================================
        function currentList() {
          const q = searchEl.value.trim().toLowerCase();
          if (!q) return pieces.slice();
          return pieces.filter(
            (p) =>
              p.data.title.toLowerCase().includes(q) ||
              (p.data.description &&
                p.data.description.toLowerCase().includes(q))
          );
        }

        function relayout() {
          const list = currentList();
          const layout = pack(list);
          applyLayout(list, layout);
          lastLayout = layout;

          countEl.textContent =
            "Showing " + list.length + " of " + pieces.length + " pieces";
          const isEmpty = list.length === 0;
          emptyEl.classList.toggle("show", isEmpty);
          // in the empty hall, drop the end wall and the scrolling crowd; only the
          // lone puzzled visitor (viewport-fixed overlay) remains, standing in the
          // visible hall near the entrance — so reset the scroll to the entrance.
          endwall.style.display = isEmpty ? "none" : "";
          if (isEmpty) {
            renderFigures([]);
            hall.scrollLeft = 0;
          } else {
            // re-derive the crowd from the (filtered) packing so nobody stands in
            // the now-empty void, then start the repulsion loop.
            renderFigures(distributeFigures(list, layout));
            kickFigures();
          }
        }

        // =====================================================================
        // MINIMAP — tick per piece, draggable viewport window = scroll progress.
        // =====================================================================
        let mmTicks = [];
        function updateMinimap(list, layout) {
          // clear old ticks (keep the window element)
          for (const t of mmTicks) t.remove();
          mmTicks = [];
          const total = parseFloat(track.style.width);
          const mmW = minimap.clientWidth;
          for (const p of list) {
            const t = document.createElement("div");
            t.className = "tick";
            t.style.left = (p.x / total) * mmW + "px";
            minimap.appendChild(t);
            mmTicks.push(t);
          }
          syncWindow();
        }
        function syncWindow() {
          const total = parseFloat(track.style.width) || hall.scrollWidth;
          const mmW = minimap.clientWidth;
          const winW = Math.max((hall.clientWidth / total) * mmW, 12);
          const winX = (hall.scrollLeft / total) * mmW;
          winEl.style.width = winW + "px";
          winEl.style.left = Math.min(winX, mmW - winW) + "px";
        }
        // Direct, 1:1 drag: place the window's left edge at (pointer - grab offset)
        // and write scrollLeft synchronously so the green window stays glued to the
        // hand. The mapping is the exact inverse of syncWindow's winX, so releasing
        // mid-drag never causes a jump. behavior:'auto' (the default now) keeps the
        // write instant.
        function dragTo(clientX) {
          const rect = minimap.getBoundingClientRect();
          const mmW = rect.width;
          const winW = winEl.offsetWidth;
          const total = parseFloat(track.style.width) || hall.scrollWidth;
          let winLeft = clientX - rect.left - mmGrabDX;
          winLeft = Math.max(0, Math.min(winLeft, mmW - winW));
          hall.scrollLeft = (winLeft / mmW) * total; // synchronous, no smooth glide
          winEl.style.left = winLeft + "px"; // glue the window this frame
        }
        // Discrete click on the track (outside the window): glide smoothly to center
        // the viewport on the clicked point. A click can be anywhere on the strip, so
        // it's exactly the long-sweep case the clamp exists for — route through glideTo.
        function jumpTo(clientX) {
          const rect = minimap.getBoundingClientRect();
          const frac = (clientX - rect.left) / rect.width;
          const total = parseFloat(track.style.width) || hall.scrollWidth;
          glideTo(frac * total - hall.clientWidth / 2);
        }
        let mmDrag = false;
        let mmGrabDX = 0;
        minimap.addEventListener("pointerdown", (e) => {
          minimap.setPointerCapture(e.pointerId);
          const winRect = winEl.getBoundingClientRect();
          if (e.clientX >= winRect.left && e.clientX <= winRect.right) {
            // Grabbed the window itself → direct drag, preserving the grab offset.
            cancelGlide(); // a direct drag takes over from any in-flight glide
            mmDrag = true;
            mmGrabDX = e.clientX - winRect.left;
          } else {
            // Clicked the bare track → smooth jump; subsequent moves scrub directly
            // with the window centered under the pointer.
            mmGrabDX = winEl.offsetWidth / 2;
            mmDrag = true;
            jumpTo(e.clientX);
          }
        });
        minimap.addEventListener("pointermove", (e) => {
          if (mmDrag) dragTo(e.clientX);
        });
        minimap.addEventListener("pointerup", (e) => {
          mmDrag = false;
        });
        minimap.addEventListener("pointercancel", (e) => {
          mmDrag = false;
        });

        // =====================================================================
        // FULL-DISTANCE GLIDE + TRANSIT MODE — the fix for fast-glide tearing
        // (Home/End, ← Entrance, minimap track-click). A CDP raster trace of an
        // uncapped smooth End-glide at n=150 showed ~half of the in-transit compositor
        // frames CHECKERBOARDED (un-rastered tiles presented): the viewport sweeps the
        // ~33k px layer faster than the raster threads can fill newly-exposed tiles,
        // which reads as banding/tearing. (A textured-vs-flat A/B ruled out the
        // procedural wall/floor tiles — they decode to a bitmap once and tile cheaply.)
        //
        // The earlier fix teleported most of the way then glided a short tail — but
        // that killed the *feeling* of scrolling the hall. So now we genuinely sweep
        // the WHOLE distance with a custom rAF animation (not scrollTo({smooth}), so we
        // own the velocity curve): ease-in-out with a peak-velocity cap, duration
        // growing with distance but capped for the full hall. We win the raster race
        // not by sweeping less, but by entering TRANSIT MODE during the sweep (.track
        // .transit) — which strips the swept content to trivially-rasterizable mats +
        // borders + flat wall/floor, hiding chart SVGs, plaque text, spotlight cones,
        // visitors, and frame shadows (see the CSS block). The velocity gate already
        // suppresses NEW chart injection mid-glide; transit mode removes the raster
        // cost of what's still in the DOM. On settle we exit transit and run the normal
        // settle injection. Reduced motion stays an INSTANT jump (no glide, no transit).
        // NOT applied to minimap DRAG (direct 1:1) or wheel — those write scrollLeft
        // directly and CANCEL any active glide.
        const GLIDE_PEAK_VEL = 11000; // px/s — cruise velocity cap (honored until the
        // duration cap kicks in for the longest sweeps)
        const GLIDE_MIN_MS = 260;
        const GLIDE_MAX_MS = 2000; // full-hall glide caps here (~2.0s rush)
        // a sweep longer than this enters transit mode (short hops don't checkerboard)
        const TRANSIT_MIN_DIST = () => hall.clientWidth * 1.2;

        // ---- ASYMMETRIC glide curve. The old symmetric easeInOutCubic started too
        // gently (peak slope 3× the average, all of it spent ramping), which read as a
        // laggy, slow takeoff. Instead we sweep on a TRAPEZOIDAL velocity profile:
        // accelerate hard over the first GLIDE_IN of the time, hold a flat CRUISE for
        // the long middle, then ease out over the last GLIDE_OUT for a soft landing.
        // Integrating that velocity gives the position curve glideEase(). The cruise
        // (= peak) slope is only ~1.29× the average, so the glide spends its time
        // cruising, not ramping — the first ~200ms already feels like real movement.
        const GLIDE_IN = 0.15,
          GLIDE_OUT = 0.3; // ease-in / ease-out time fractions
        const GLIDE_CRUISE_SLOPE =
          1 / (GLIDE_IN / 2 + (1 - GLIDE_IN - GLIDE_OUT) + GLIDE_OUT / 2);
        function glideEase(t) {
          const a = GLIDE_IN,
            b = 1 - GLIDE_OUT,
            vc = GLIDE_CRUISE_SLOPE;
          if (t < a) return (vc * t * t) / (2 * a); // accelerate
          const dA = (vc * a) / 2; // dist via ease-in
          if (t < b) return dA + vc * (t - a); // cruise
          const td = (t - b) / (1 - b);
          return dA + vc * (b - a) + vc * (1 - b) * (td - (td * td) / 2); // ease-out landing
        }

        let glideRAF = 0,
          glideActive = false,
          transitOn = false;

        function enterTransit() {
          if (transitOn) return;
          transitOn = true;
          track.classList.add("transit");
        }
        function exitTransit() {
          if (!transitOn) return;
          transitOn = false;
          track.classList.remove("transit");
        }
        // Cancel an in-flight glide cleanly (wheel/pointer input, or a new glide).
        // Always leaves transit mode so a hijacked glide never gets stuck cheap.
        function cancelGlide() {
          if (glideRAF) {
            cancelAnimationFrame(glideRAF);
            glideRAF = 0;
          }
          glideActive = false;
          exitTransit();
        }

        function maxScrollNow() {
          return Math.max(
            0,
            (parseFloat(track.style.width) || hall.scrollWidth) -
              hall.clientWidth
          );
        }
        function glideTo(target) {
          cancelGlide();
          const max = maxScrollNow();
          target = Math.max(0, Math.min(target, max));
          if (reduceMotion) {
            hall.scrollLeft = target;
            instantJumpInject();
            return;
          }
          const from = hall.scrollLeft;
          const dist = target - from;
          const adist = Math.abs(dist);
          if (adist < 2) {
            hall.scrollLeft = target;
            return;
          }

          // Duration honors the cruise-velocity cap: peak (cruise) slope is
          // GLIDE_CRUISE_SLOPE × average, so peak = SLOPE·dist/dur ⇒ dur = SLOPE·dist/peak.
          // Clamp to [MIN, MAX]; once MAX clamps (≈ the full hall) the sweep simply runs
          // faster and transit mode carries the raster load. Short/mid jumps stay
          // velocity-capped (not instant) so they read as a real move, not a teleport.
          let dur = ((GLIDE_CRUISE_SLOPE * adist) / GLIDE_PEAK_VEL) * 1000;
          dur = Math.max(GLIDE_MIN_MS, Math.min(GLIDE_MAX_MS, dur));

          const longSweep = adist > TRANSIT_MIN_DIST();
          if (longSweep) enterTransit();
          glideActive = true;
          const t0 = performance.now();
          function step(now) {
            const t = Math.min(1, (now - t0) / dur);
            const e = glideEase(t);
            hall.scrollLeft = from + dist * e;
            if (t < 1) {
              glideRAF = requestAnimationFrame(step);
            } else {
              glideRAF = 0;
              glideActive = false;
              hall.scrollLeft = target;
              if (longSweep) exitTransit(); // fades detail back in
              onSettle(); // inject the destination band promptly
            }
          }
          glideRAF = requestAnimationFrame(step);
        }

        // =====================================================================
        // INPUT — wheel→horizontal, keyboard paging, hint fade, scroll sync.
        // =====================================================================
        // Only translate a *dominant-vertical* wheel into horizontal scroll, so
        // trackpad two-finger horizontal pans and touch swipes are left native.
        hall.addEventListener(
          "wheel",
          (e) => {
            cancelGlide(); // any wheel input cancels an in-flight glide cleanly
            if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
              hall.scrollLeft += e.deltaY;
              e.preventDefault();
            }
          },
          { passive: false }
        );
        // a touch/pointer grab on the hall also takes over from an active glide
        hall.addEventListener("pointerdown", (e) => {
          if (glideActive) cancelGlide();
        });

        // Arrow keys page by < 1 viewport (always a smooth glide; too short to clamp).
        // Home/End/Entrance/minimap-click route through glideTo, which sweeps the full
        // distance in transit mode and handles the reduced-motion instant jump internally.
        window.addEventListener("keydown", (e) => {
          if (e.target === searchEl) return;
          if (e.key === "ArrowRight") {
            hall.scrollTo({
              left: hall.scrollLeft + hall.clientWidth * 0.8,
              behavior: "smooth",
            });
            e.preventDefault();
          } else if (e.key === "ArrowLeft") {
            hall.scrollTo({
              left: hall.scrollLeft - hall.clientWidth * 0.8,
              behavior: "smooth",
            });
            e.preventDefault();
          }
          // Home (fn+Left on Mac) glides back to the entrance; End to the end wall —
          // a full-distance rAF glide in transit mode (glideTo handles the
          // reduced-motion instant case + destination injection internally).
          else if (e.key === "Home") {
            glideTo(0);
            e.preventDefault();
          } else if (e.key === "End") {
            glideTo(maxScrollNow());
            e.preventDefault();
          }
        });

        // ---- back-to-entrance chip: a paper chip that fades in once the visitor has
        // walked meaningfully into the hall (> one viewport in), like a back-to-top.
        const backstart = document.getElementById("backstart");
        backstart.addEventListener("click", () => {
          glideTo(0);
        });

        let hintHidden = false;
        let scrollRAF = 0;
        hall.addEventListener(
          "scroll",
          () => {
            syncWindow();
            if (!hintHidden && hall.scrollLeft > 80) {
              hint.style.opacity = "0";
              hintHidden = true;
            }
            // reveal the entrance chip once the visitor is more than a viewport in
            backstart.classList.toggle(
              "show",
              hall.scrollLeft > hall.clientWidth
            );
            if (pointerActive) kickFigures(); // re-evaluate repulsion as the wall moves
            // sample scroll velocity → gates injection during transit and runs the settle
            // pass when the glide lands (keeps sampling a few frames past the last event).
            kickVel();
            // ensureVisible self-gates on velocity: a no-op mid-glide, prompt during slow
            // browsing. The settle pass covers the landing.
            if (!scrollRAF)
              scrollRAF = requestAnimationFrame(() => {
                scrollRAF = 0;
                ensureVisible();
              });
          },
          { passive: true }
        );

        searchEl.addEventListener("input", relayout);

        // =====================================================================
        // INIT
        // =====================================================================
        function init() {
          buildPieces();
          pieces.forEach((p) => io.observe(p.el));
          env = computeEnv();
          relayout(); // packs, places pieces, and derives the crowd from the packing
          // enable position transitions only after the first paint, so pieces
          // don't fly in from (0,0) on load.
          requestAnimationFrame(() =>
            requestAnimationFrame(() => {
              if (!reduceMotion) track.classList.add("animate");
              // mark first wall paint for the capture script's metrics
              window.__galleryReady = performance.now();
            })
          );
          window.__galleryPackMs = () => lastPackMs;
          // packing diagnostics for the capture script: column count + stack histogram
          window.__galleryStacks = () => {
            const cols = (lastLayout && lastLayout.columns) || [];
            const hist = {};
            for (const c of cols) {
              const n = c.items.length;
              hist[n] = (hist[n] || 0) + 1;
            }
            return {
              columns: cols.length,
              hist,
              scale: +env.S.toFixed(3),
              band: Math.round(env.band),
            };
          };
          window.__galleryFigures = () => figureState.length;
          // packing → DOM bridge for verification: columns with each piece's
          // .frame DOM index + track-coord geometry (x/y/boxW/boxH).
          window.__galleryLayout = () => {
            const cols = (lastLayout && lastLayout.columns) || [];
            const frames = [...document.querySelectorAll(".frame")];
            return cols.map((c) => ({
              items: c.items.map((p) => ({
                frameIndex: frames.indexOf(p.frameEl),
                x: p.x,
                y: p.y,
                boxW: p.boxW,
                boxH: p.boxH,
              })),
            }));
          };
        }
        let lastLayout = null;

        let rt;
        window.addEventListener("resize", () => {
          clearTimeout(rt);
          rt = setTimeout(() => {
            env = computeEnv();
            relayout(); // re-derives the crowd for the new width
          }, 150);
        });

        if (RAW.length === 0) {
          countEl.textContent = "renders.js failed to load";
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
