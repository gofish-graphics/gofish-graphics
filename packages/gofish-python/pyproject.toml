[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

# NOTE: the PyPI distribution name is `gofish-graphics` (installed via
# `pip install gofish-graphics`, imported as `gofish`). The pnpm workspace
# package is still named `gofish-python` in package.json — that name is
# internal and never published to npm. The release workflow rewrites the
# version here in lockstep with the npm packages before building the wheel.
[project]
name = "gofish-graphics"
version = "0.1.0"
description = "Clean AST implementation for GoFish graphics library"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "anywidget>=0.9.0",
    "pyarrow>=10.0.0",
    "narwhals>=2.0.0",
]
# Note: The widget bundle (gofish/_static/widget.esm.js) is self-contained
# and includes all dependencies (gofish-graphics, solid-js, apache-arrow).
# No network access or import maps are required at runtime.
#
# Data ingestion (gofish/arrow_utils.py) is dataframe-agnostic via narwhals
# (https://narwhals-dev.github.io/narwhals/): pandas, polars, pyarrow,
# DuckDB relations, etc. are all accepted, but none of them is a hard
# dependency of this package — narwhals is a zero-dependency shim over
# whichever dataframe library the caller already has installed.

[project.optional-dependencies]
test = [
    "pytest>=7.0.0",
    "pandas>=1.5.0",
    "polars>=1.0.0",
    "vega_datasets>=0.9",
    "scipy>=1.10",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.setuptools]
# Include the widget bundle in package data
# This ensures the bundle is included when building wheels
include-package-data = true
# Explicitly specify packages to avoid including node_modules
packages = ["gofish"]

[tool.setuptools.package-data]
# Include the widget bundle from gofish/_static/
gofish = ["_static/widget.esm.js"]
